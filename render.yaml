services:
  - type: web
    name: shoppilot-api
    env: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: false
      - key: ALLOWED_ORIGINS
        value: "https://shoppilot.vercel.app,http://localhost:3000"
